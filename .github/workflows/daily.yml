name: Daily refresh

# The doc's "product should refresh itself daily". Render's own cron is a paid feature,
# so a scheduled workflow calling the endpoint does the job for free.
#
# It is also the keep-alive: Supabase pauses a free project after 7 days of inactivity,
# and this hitting the database every day is what stops that happening. If you ever
# disable this workflow, the database will eventually go to sleep on you.

on:
  schedule:
    # 02:30 UTC = 08:00 IST, after the NSE close and before the US open.
    - cron: "30 2 * * *"
  workflow_dispatch: # so you can trigger it by hand from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # An unset secret is an empty string, not an error. Without this the run dies six
      # times over on `curl: (3) No host part in the URL`, which says nothing about the
      # actual problem.
      - name: Check the secrets are set
        env:
          APP_URL: ${{ secrets.APP_URL }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          missing=0
          if [ -z "${APP_URL}" ]; then
            echo "::error::Repo secret APP_URL is not set. Add your Render URL under"
            echo "::error::Settings -> Secrets and variables -> Actions, e.g."
            echo "::error::  https://portfolio-manager-xxxx.onrender.com   (no trailing slash)"
            missing=1
          elif ! echo "${APP_URL}" | grep -qE '^https?://'; then
            echo "::error::APP_URL must include the scheme: https://your-app.onrender.com"
            missing=1
          fi
          if [ -z "${REFRESH_TOKEN}" ]; then
            echo "::error::Repo secret REFRESH_TOKEN is not set. It must match the"
            echo "::error::REFRESH_TOKEN env var you gave Render, or /api/refresh will 401."
            missing=1
          fi
          exit $missing

      - name: Wake the service and refresh prices
        env:
          # Trim any trailing slash: "https://x.com/" + "/healthz" is a 404.
          APP_URL: ${{ secrets.APP_URL }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          APP_URL="${APP_URL%/}"

          # The free tier sleeps after ~15 minutes idle and takes up to a minute to wake,
          # so the first call is a health check with a generous budget rather than the
          # real request -- otherwise the refresh would time out against a cold start.
          echo "Waking $APP_URL ..."
          curl -sS --fail --retry 5 --retry-all-errors --retry-delay 15 \
               --max-time 120 "$APP_URL/healthz" > /dev/null
          echo "Awake."

          curl -sS --fail --max-time 300 \
               -X POST "$APP_URL/api/refresh" \
               -H "Authorization: Bearer $REFRESH_TOKEN" | tee response.json

          # A snapshot with every holding unpriced means the run "succeeded" while
          # recording nothing useful. Fail loudly rather than bank a hollow day.
          python3 - <<'PY'
          import json, sys
          data = json.load(open("response.json"))
          for snap in data["snapshots"]:
              print(f"{snap['market']}: {snap['stocks']} holdings, unpriced={snap['unpriced']}")
          live = [s for s in data["snapshots"] if s["stocks"]]
          if live and all(len(s["unpriced"]) == s["stocks"] for s in live):
              sys.exit("Every holding failed to price — check the market data provider.")
          PY
