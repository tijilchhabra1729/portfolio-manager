services:
  db:
    image: postgres:16-alpine
    container_name: pm-postgres
    environment:
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: pm
      POSTGRES_DB: portfolio
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm -d portfolio"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
